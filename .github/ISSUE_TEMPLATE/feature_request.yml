name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety or compatibility considerations
