name: Bug report
description: Report reproducible incorrect behaviour
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please keep the lamp or shutter disabled while reproducing unsafe output behaviour.
  - type: input
    id: version
    attributes:
      label: FART version
      placeholder: 0.4.0
    validations:
      required: true
  - type: dropdown
    id: output
    attributes:
      label: Output mode
      options: [Open DMX, Art-Net, sACN, Not applicable]
    validations:
      required: true
  - type: dropdown
    id: fader
    attributes:
      label: Fader mode
      options: [Manual, OSC, Art-Net Input, Not applicable]
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Fixture and channel mapping
      description: Include model, mode, start address, and relevant absolute DMX channels.
  - type: textarea
    id: psn
    attributes:
      label: PSN status
      description: Include packets, data, selected, and positions counters.
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
