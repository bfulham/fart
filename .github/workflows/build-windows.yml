name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build FART.exe
        run: python -m PyInstaller --noconfirm --clean FART.spec

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path dist/FART.exe -DestinationPath FART-Windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FART-Windows-x64
          path: FART-Windows-x64.zip
          if-no-files-found: error

      - name: Create or update tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes --title "FART ${{ github.ref_name }}"
          }
          gh release upload "${{ github.ref_name }}" FART-Windows-x64.zip --clobber
